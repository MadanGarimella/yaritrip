spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# REDIS CONFIG
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000

# RAZORPAY CONFIG
razorpay.key=dummy_key
razorpay.secret=dummy_secret
razorpay.webhook.secret=dummy_webhook_secret
# IMPORTANT: Webhook Secret (NOT same as API secret)
razorpay.webhook.secret=YOUR_WEBHOOK_SECRET

# MICROSERVICE URLs
services.booking.url=http://localhost:8082
services.wallet.url=http://localhost:8082

# FEIGN CONFIG
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# LOGGING CONFIG
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Log file (optional)
logging.file.name=logs/payment-service.log

# SECURITY (JWT - if used)
jwt.secret=YOUR_JWT_SECRET
jwt.expiration=86400000

# ACTUATOR (Monitoring)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# SERVER CONFIG
server.error.include-message=always
server.error.include-binding-errors=always